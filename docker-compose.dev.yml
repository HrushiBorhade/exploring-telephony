services:
  api:
    build:
      context: .
      target: builder
    command: npx tsx watch src/server.ts
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://telephony:telephony@postgres:5432/telephony
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: telephony
      POSTGRES_PASSWORD: telephony
      POSTGRES_DB: telephony
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telephony"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
