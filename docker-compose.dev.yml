services:
  api:
    build:
      context: .
      target: builder
    command: sh -c "npx drizzle-kit push && npx tsx watch apps/api/src/server.ts"
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://telephony:telephony@postgres:5432/telephony
      - REDIS_HOST=redis
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
      - ./drizzle.config.ts:/app/drizzle.config.ts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: telephony
      POSTGRES_PASSWORD: telephony
      POSTGRES_DB: telephony
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telephony"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
  redis_data:
