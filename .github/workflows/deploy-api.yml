name: Deploy API to ECS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "Dockerfile"
      - "drizzle/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: telephony-api
  ECS_CLUSTER: telephony-cluster
  ECS_SERVICE: telephony-api

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/telephony-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      # Run migrations BEFORE deploying new code.
      # Gets DATABASE_URL from Secrets Manager, runs drizzle-kit migrate.
      # If migration fails, deployment stops — no broken code goes live.
      - name: Run database migrations
        env:
          SECRET_ARN: arn:aws:secretsmanager:ap-south-1:${{ secrets.AWS_ACCOUNT_ID }}:secret:telephony/prod/app-secrets-ZlrHwv
        run: |
          DB_URL=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --query 'SecretString' --output text | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).DATABASE_URL))")
          DATABASE_URL="$DB_URL" NODE_ENV=production npx drizzle-kit migrate

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
